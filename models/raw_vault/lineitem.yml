version: 2

models:
  - name: lineitem_nl
    columns:
      - name: hk_lineitem_nl
        tests:
          - unique
          - not_null
      - name: hk_order_h
        tests:
          - relationships:
              arguments:
                to: ref('order_h')
                field: hk_order_h
      - name: hk_part_h
        tests:
          - relationships:
              arguments:
                to: ref('part_h')
                field: hk_part_h
      - name: hk_supplier_h
        tests:
          - relationships:
              arguments:
                to: ref('supplier_h')
                field: hk_supplier_h
  - name: lineitem_n0_s
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hk_lineitem_nl
              - ldts
    columns:
      - name: hk_lineitem_nl
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('lineitem_nl')
                field: hk_lineitem_nl